<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Pati - Édition Jeunesse Guinéenne. Livres et contes en 8 langues.">
    <meta name="theme-color" content="#D2691E">
    <title>Pati - Édition Jeunesse Guinéenne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --terre: #D2691E;
            --forest: #228B22;
            --safran: #F4C430;
            --laterite: #C04000;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }
        .mobile-frame {
            max-width: 414px;
            height: 100vh;
            margin: 0 auto;
            background: linear-gradient(135deg, #FFF8DC 0%, #F5F5DC 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes sound {
            0% { height: 3px; opacity: .35; }
            100% { height: 100%; opacity: 1; }
        }
        @keyframes correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--terre); border-radius: 3px; }
        .audio-bar {
            width: 4px;
            background: linear-gradient(to top, var(--terre), var(--safran));
            border-radius: 2px;
            animation: sound 0ms -800ms linear infinite alternate;
        }
        .playing .audio-bar { animation-duration: 400ms; }
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--terre);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #ddd;
            border-radius: 2px;
        }
        .african-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D2691E' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .book-card { transition: all 0.3s ease; }
        .book-card:active { transform: scale(0.95); }
        .lang-btn { transition: all 0.2s; }
        .lang-btn.active { background: var(--terre); color: white; transform: scale(1.1); }
        .quiz-option { transition: all 0.3s; }
        .quiz-option.selected { background: var(--forest); color: white; }
        .quiz-option.correct { background: var(--forest); color: white; animation: correct 0.5s; }
        .quiz-option.wrong { background: var(--laterite); color: white; animation: shake 0.5s; }
        .pdf-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .pdf-overlay.active { display: flex; }
        .pati-toast {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 50;
            animation: fadeIn 0.3s ease-out;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="app" class="mobile-frame african-pattern relative"></div>

    <div id="pdfViewer" class="pdf-overlay">
        <div class="flex items-center justify-between p-4 bg-gray-900 text-white">
            <button onclick="closePdf()" class="flex items-center gap-2 text-sm"><i class="fas fa-arrow-left"></i> Retour</button>
            <span id="pdfTitle" class="font-bold text-sm truncate max-w-[200px]"></span>
            <button onclick="closePdf()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 bg-gray-800 relative">
            <iframe id="pdfFrame" class="w-full h-full border-0" src="" title="PDF Viewer"></iframe>
        </div>
    </div>

    <script>
    // ============================================================
    // BASE DE DONNÉES - MODIFIE CECI AVEC TES LIVRES
    // ============================================================
    const DB = {
        livres: [
            {
                id: "1",
                titre: "BINTA PILOTE",
                description: "L'epopee de la premiere femme pilote d'avion d'Afrique noire, LA DAME OISEAU",
                couverture_url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=600&fit=crop",
                pdf_url: "",
                auteur: "Mohamed Doumbouya",
                couleur: "from-orange-600 to-amber-700"
            },
            {
                id: "2",
                titre: "LAYE DE KOUROUSSA",
                description: "Un conte initiatique d'un jeune garcon de Kouroussa.",
                couverture_url: "https://images.unsplash.com/photo-1535905557558-afc4877a26fc?w=400&h=600&fit=crop",
                pdf_url: "",
                auteur: "Mohamed Doumbouya",
                couleur: "from-green-700 to-emerald-800"
            },
            {
                id: "3",
                titre: "GUINEE, CHATEAU D'EAU",
                description: "L'eau en Guinee est une benediction, suivons l'histoire de Electroman de Bolodou.",
                couverture_url: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&h=600&fit=crop",
                pdf_url: "",
                auteur: "Mohamed Doumbouya",
                couleur: "from-yellow-600 to-orange-600"
            },
            {
                id: "4",
                titre: "SACREE D'MBA",
                description: "Tout sur le D'Mba. Amadou et Fifi decouvrent les secrets de l'icone nationale de Guinee",
                couverture_url: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=400&h=600&fit=crop",
                pdf_url: "",
                auteur: "Mohamed Doumbouya",
                couleur: "from-red-700 to-orange-700"
            }
        ],
        chapitres: [
            {
                id: "c1",
                livre_id: "1",
                numero_chapitre: 1,
                texte_fr: "Il etait une fois, dans les terres du Sosso, un roi nomme Sumanguru. Dote de pouvoirs mystiques, il regna avec sagesse et force. Son palais etait construit en pierres rouges, refletant la laterite des collines guineennes. Les griots chantaient ses exploits jusqu'au coucher du soleil...",
                texte_en: "Once upon a time, in the lands of Sosso, there lived a king named Sumanguru. Endowed with mystical powers, he ruled with wisdom and strength. His palace was built of red stones, reflecting the laterite of the Guinean hills. The griots sang of his exploits until sunset...",
                texte_es: "Erase una vez, en las tierras de Sosso, un rey llamado Sumanguru. Dotado de poderes misticos, goberno con sabiduria y fuerza. Su palacio estaba construido con piedras rojas, reflejando la laterita de las colinas guineanas. Los griots cantaban sus hazanas hasta la puesta del sol...",
                texte_ar: "كان يا ما كان، في أراضي سوسو، ملك اسمه سومانغورو. متسلحًا بالقوى الغامضة، حكم بالحكمة والقوة. قصره كان مبنيًا من الحجارة الحمراء، تعكس اللاتيريت في التلال الغينية. كان المغنون يرتجلون أشعارهم حتى غروب الشمس...",
                image_url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&h=600&fit=crop",
                audio_fr_url: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav",
                audio_pular_url: "https://www.soundjay.com/misc/sounds/bell-ringing-04.wav",
                audio_soussou_url: "https://www.soundjay.com/misc/sounds/bell-ringing-03.wav",
                audio_malinke_url: "https://www.soundjay.com/misc/sounds/bell-ringing-02.wav",
                audio_guerze_url: "https://www.soundjay.com/misc/sounds/bell-ringing-01.wav",
                audio_toma_url: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav",
                audio_kissi_url: "https://www.soundjay.com/misc/sounds/bell-ringing-04.wav",
                audio_koniagui_url: "https://www.soundjay.com/misc/sounds/bell-ringing-03.wav",
                audio_landouma_url: "https://www.soundjay.com/misc/sounds/bell-ringing-02.wav"
            }
        ],
        quiz: [
            {
                id: "q1",
                livre_id: "1",
                question: "De quelle couleur etait le palais du Roi Sumanguru ?",
                options: ["Blanc", "Rouge (Laterite)", "Bleu", "Jaune"],
                reponse_correcte_index: 1
            },
            {
                id: "q2",
                livre_id: "1",
                question: "Qui chantait les exploits du roi ?",
                options: ["Les guerriers", "Les griots", "Les enfants", "Les etrangers"],
                reponse_correcte_index: 1
            },
            {
                id: "q3",
                livre_id: "1",
                question: "Dans quelle region vivait Sumanguru ?",
                options: ["Le Fouta", "Le Sosso", "La Basse Guinee", "La Guinee Forestiere"],
                reponse_correcte_index: 1
            }
        ]
    };

    // ============================================================
    // STORAGE
    // ============================================================
    const Storage = {
        getBooks() {
            const saved = localStorage.getItem('pati_books');
            return saved ? JSON.parse(saved) : [...DB.livres];
        },
        saveBooks(books) {
            localStorage.setItem('pati_books', JSON.stringify(books));
        },
        getChapitres() {
            const saved = localStorage.getItem('pati_chapitres');
            return saved ? JSON.parse(saved) : [...DB.chapitres];
        },
        getQuiz() {
            const saved = localStorage.getItem('pati_quiz');
            return saved ? JSON.parse(saved) : [...DB.quiz];
        },
        getState() {
            const saved = localStorage.getItem('pati_state');
            return saved ? JSON.parse(saved) : {};
        },
        saveState(partialState) {
            const current = this.getState();
            localStorage.setItem('pati_state', JSON.stringify({ ...current, ...partialState }));
        },
        updateBookCover(bookId, dataUrl) {
            const books = this.getBooks();
            const idx = books.findIndex(b => b.id === bookId);
            if (idx !== -1) { books[idx].couverture_url = dataUrl; this.saveBooks(books); }
        },
        updateBookPdf(bookId, blobUrl) {
            const books = this.getBooks();
            const idx = books.findIndex(b => b.id === bookId);
            if (idx !== -1) { books[idx].pdf_url = blobUrl; this.saveBooks(books); }
        },
        resetToDefault() {
            localStorage.removeItem('pati_books');
            localStorage.removeItem('pati_chapitres');
            localStorage.removeItem('pati_quiz');
            localStorage.removeItem('pati_state');
            location.reload();
        },
        exportData() {
            const data = { livres: this.getBooks(), chapitres: this.getChapitres(), quiz: this.getQuiz(), exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pati_backup_' + new Date().toISOString().slice(0,10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        },
        importData(jsonString) {
            const data = JSON.parse(jsonString);
            if (data.livres) this.saveBooks(data.livres);
            if (data.chapitres) this.saveChapitres(data.chapitres);
        }
    };

    // ============================================================
    // STATE
    // ============================================================
    let db = { livres: Storage.getBooks(), chapitres: Storage.getChapitres(), quiz: Storage.getQuiz() };
    const savedState = Storage.getState();
    const state = {
        currentPage: savedState.currentPage || 'home',
        selectedBook: savedState.selectedBook || null,
        currentChapter: savedState.currentChapter || 0,
        textLanguage: savedState.textLanguage || 'fr',
        audioLanguage: savedState.audioLanguage || 'pular',
        isPlaying: false,
        currentTime: 0,
        duration: 180,
        quizScore: 0,
        currentQuestion: 0,
        quizAnswers: [],
        audioInterval: null,
        showAdmin: false
    };

    // ============================================================
    // AUDIO ENGINE
    // ============================================================
    let audioCtx = null, oscillator = null, gainNode = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playTone() {
        initAudio();
        if (oscillator) { try { oscillator.stop(); } catch(e){} oscillator = null; }
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.value = 440;
        gainNode.gain.value = 0.05;
        oscillator.start();
    }
    function stopTone() {
        if (oscillator) { try { oscillator.stop(); } catch(e){} oscillator = null; }
    }
    function cleanupAudio() {
        stopTone();
        if (state.audioInterval) { clearInterval(state.audioInterval); state.audioInterval = null; }
        state.isPlaying = false;
        state.currentTime = 0;
    }

    // ============================================================
    // ROUTER
    // ============================================================
    function navigate(page, data) {
        if (state.currentPage === 'audio' && page !== 'audio') cleanupAudio();
        state.currentPage = page;
        if (data) {
            if (data.book) state.selectedBook = data.book;
            if (data.chapter !== undefined) state.currentChapter = data.chapter;
        }
        Storage.saveState({ currentPage: state.currentPage, selectedBook: state.selectedBook, currentChapter: state.currentChapter });
        try { history.pushState({ page: page, data: data }, '', '#' + page); } catch(e){}
        render();
        window.scrollTo(0, 0);
    }
    window.onpopstate = function(e) {
        if (e.state && e.state.page) {
            state.currentPage = e.state.page;
            if (e.state.data && e.state.data.book) state.selectedBook = e.state.data.book;
            render();
        }
    };

    // ============================================================
    // PDF VIEWER
    // ============================================================
    function openPdf(url, title) {
        if (!url) { showToast('Aucun PDF disponible'); return; }
        var viewer = document.getElementById('pdfViewer');
        var frame = document.getElementById('pdfFrame');
        var titleEl = document.getElementById('pdfTitle');
        if (url.indexOf('blob:') === 0 || url.indexOf('http') === 0) {
            frame.src = url;
        } else {
            frame.src = 'https://docs.google.com/gview?embedded=1&url=' + encodeURIComponent(window.location.href.replace(/\/$/, '') + '/' + url);
        }
        titleEl.textContent = title || 'Document';
        viewer.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closePdf() {
        var viewer = document.getElementById('pdfViewer');
        var frame = document.getElementById('pdfFrame');
        frame.src = '';
        viewer.classList.remove('active');
        document.body.style.overflow = '';
    }

    // ============================================================
    // UPLOAD HANDLERS
    // ============================================================
    function handleCoverUpload(bookId, input) {
        var file = input.files[0];
        if (!file) return;
        if (!file.type.match('image.*')) { showToast('Selectionne une image'); return; }
        var reader = new FileReader();
        reader.onload = function(e) {
            Storage.updateBookCover(bookId, e.target.result);
            db.livres = Storage.getBooks();
            showToast('Couverture mise a jour !');
            render();
        };
        reader.readAsDataURL(file);
    }
    function handlePdfUpload(bookId, input) {
        var file = input.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') { showToast('Selectionne un PDF'); return; }
        var blobUrl = URL.createObjectURL(file);
        Storage.updateBookPdf(bookId, blobUrl);
        db.livres = Storage.getBooks();
        showToast('PDF charge !');
        render();
    }
    function importData(input) {
        var file = input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                Storage.importData(e.target.result);
                db.livres = Storage.getBooks();
                db.chapitres = Storage.getChapitres();
                showToast('Donnees importees !');
                render();
            } catch(err) { showToast("Erreur d'import"); }
        };
        reader.readAsText(file);
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function getBookById(id) {
        var book = db.livres.find(function(b) { return b.id === id; });
        return book ? Object.assign({}, book) : null;
    }
    function showToast(message) {
        var existing = document.querySelector('.pati-toast');
        if (existing) existing.remove();
        var toast = document.createElement('div');
        toast.className = 'pati-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 2000);
    }
    function toggleAdmin() {
        state.showAdmin = !state.showAdmin;
        state.currentPage = state.showAdmin ? 'admin' : 'home';
        render();
    }
    function changeTextLanguage(lang) {
        state.textLanguage = lang;
        Storage.saveState({ textLanguage: lang });
        render();
    }
    function changeAudioLanguage(lang) {
        state.audioLanguage = lang;
        Storage.saveState({ audioLanguage: lang });
        showToast('Audio: ' + lang);
        render();
    }
    function togglePlay() {
        state.isPlaying = !state.isPlaying;
        if (state.isPlaying) {
            playTone();
            state.audioInterval = setInterval(function() {
                if (state.currentTime < state.duration) {
                    state.currentTime++;
                    var range = document.querySelector('input[type=range]');
                    if (range) range.value = state.currentTime;
                } else {
                    cleanupAudio();
                    render();
                }
            }, 1000);
        } else {
            stopTone();
            if (state.audioInterval) clearInterval(state.audioInterval);
        }
        render();
    }
    function seekAudio(value) {
        state.currentTime = parseInt(value);
        render();
    }
    function selectAnswer(idx) {
        state.quizAnswers[state.currentQuestion] = idx;
        render();
    }
    function nextQuestion() {
        var quiz = db.quiz.filter(function(q) { return q.livre_id === state.selectedBook.id; });
        var currentQ = quiz[state.currentQuestion];
        if (state.quizAnswers[state.currentQuestion] === currentQ.reponse_correcte_index) state.quizScore++;
        state.currentQuestion++;
        render();
    }
    function resetQuiz() {
        state.currentQuestion = 0;
        state.quizScore = 0;
        state.quizAnswers = [];
        render();
    }
    function showSubscription() {
        alert("Abonnement Premium\n\nConnecte a Orange Money / MTN en production.\n\nMVP: Acces complet !");
    }

    // ============================================================
    // COMPONENTS
    // ============================================================
    function Header() {
        return '<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b-2 border-orange-200">' +
            '<div class="flex items-center justify-between px-4 py-3">' +
                '<button onclick="navigate('home')" class="flex items-center gap-2">' +
                    '<div class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center shadow-lg">' +
                        '<i class="fas fa-book-open text-white text-lg"></i>' +
                    '</div>' +
                    '<div>' +
                        '<h1 class="text-xl font-bold text-gray-800 leading-tight">Pati</h1>' +
                        '<p class="text-xs text-gray-500">Edition Jeunesse Guinee</p>' +
                    '</div>' +
                '</button>' +
                '<div class="flex gap-2">' +
                    '<button onclick="toggleAdmin()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200" title="Gerer les livres">' +
                        '<i class="fas fa-cog"></i>' +
                    '</button>' +
                    '<button onclick="showSubscription()" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow-md hover:shadow-lg transition-all">' +
                        '<i class="fas fa-crown mr-1"></i> Premium' +
                    '</button>' +
                '</div>' +
            '</div>' +
        '</header>';
    }

    function AdminPanel() {
        var booksHtml = db.livres.map(function(book) {
            var pdfBadge = book.pdf_url ? '<p class="text-xs text-green-600 mt-2"><i class="fas fa-check mr-1"></i>PDF pret</p>' : '<p class="text-xs text-gray-400 mt-2">Aucun PDF</p>';
            var pdfBtn = book.pdf_url ? '<button onclick="openPdf('' + book.pdf_url + '', '' + book.titre + '')" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-200"><i class="fas fa-eye mr-1"></i>Voir</button>' : '';
            return '<div class="bg-white rounded-2xl p-4 shadow-md border border-gray-100">' +
                '<div class="flex gap-4">' +
                    '<img src="' + book.couverture_url + '" class="w-20 h-28 object-cover rounded-xl shadow-sm bg-gray-200" alt="cover" onerror="this.src='https://via.placeholder.com/200x280/D2691E/FFFFFF?text=Pas+d\'image'">' +
                    '<div class="flex-1 min-w-0">' +

                '</div>' +
                '<h2 class="text-2xl font-bold text-center mb-2">' + (state.selectedBook ? state.selectedBook.titre : 'Lecture') + '</h2>' +

                '<h2 class="text-2xl font-bold text-gray-800 mb-2">Pas encore de quiz</h2>' +
                '<p class="text-gray-500 mb-6 text-center">Le quiz pour ce livre sera bientot disponible.</p>' +
                '<button onclick="navigate('detail')" class="bg-gradient-to-r from-orange-500 to-red-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">Retour au livre</button>' +
            '</div>';
        }
        var currentQ = quiz[state.currentQuestion];
        var isLast = state.currentQuestion === quiz.length - 1;
        if (state.currentQuestion >= quiz.length) return QuizResult(quiz.length);
        var optionsHtml = currentQ.options.map(function(opt, idx) {
            return '<button onclick="selectAnswer(' + idx + ')" class="quiz-option w-full bg-white border-2 border-gray-200 rounded-2xl p-4 text-left font-semibold text-gray-700 hover:border-orange-300 hover:shadow-md transition-all ' + (state.quizAnswers[state.currentQuestion] === idx ? 'selected' : '') + '" data-idx="' + idx + '">' +
                '<div class="flex items-center gap-3">' +
                    '<div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-sm font-bold option-letter">' + String.fromCharCode(65 + idx) + '</div>' +
                    '<span>' + opt + '</span>' +
                '</div>' +
            '</button>';
        }).join('');
        return '<div class="animate-fade-in min-h-screen flex flex-col bg-gradient-to-b from-orange-50 to-white">' +
            '<div class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-orange-200 px-4 py-4 flex items-center justify-between">' +
                '<button onclick="navigate('detail')" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i class="fas fa-times text-gray-700"></i></button>' +
                '<div class="flex-1 mx-4"><div class="h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-orange-500 to-red-600 transition-all" style="width: ' + (((state.currentQuestion + 1) / quiz.length) * 100) + '%"></div></div></div>' +
                '<span class="text-sm font-bold text-gray-600">' + (state.currentQuestion + 1) + '/' + quiz.length + '</span>' +
            '</div>' +
            '<div class="flex-1 px-6 py-8">' +
                '<div class="mb-8">' +
                    '<span class="inline-block bg-orange-100 text-orange-700 px-4 py-2 rounded-full text-sm font-bold mb-4">Question ' + (state.currentQuestion + 1) + '</span>' +
                    '<h2 class="text-2xl font-bold text-gray-800 leading-tight">' + currentQ.question + '</h2>' +
                '</div>' +
                '<div class="space-y-3">' + optionsHtml + '</div>' +
            '</div>' +
            '<div class="px-6 py-6 bg-white border-t border-gray-200">' +
                '<button onclick="nextQuestion()" ' + (state.quizAnswers[state.currentQuestion] === undefined ? 'disabled' : '') + ' class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">' + (isLast ? 'Voir les resultats' : 'Question suivante') + '</button>' +
            '</div>' +
        '</div>';
    }

    function QuizResult(total) {
        var score = state.quizScore;
        var percentage = Math.round((score / total) * 100);
        var message = "";
        var emoji = "";
        if (percentage >= 80) { message = "Excellent ! Tu es un expert !"; emoji = "🏆"; }
        else if (percentage >= 60) { message = "Tres bien ! Continue comme ca !"; emoji = "🌟"; }
        else { message = "Continue a lire pour t'ameliorer !"; emoji = "📚"; }
        return '<div class="animate-fade-in min-h-screen flex flex-col items-center justify-center px-6 py-8 bg-gradient-to-b from-orange-50 to-white">' +
            '<div class="text-6xl mb-4 animate-float">' + emoji + '</div>' +
            '<h2 class="text-3xl font-bold text-gray-800 mb-2">Quiz termine !</h2>' +
            '<p class="text-gray-600 mb-8 text-center">' + message + '</p>' +
            '<div class="bg-white rounded-3xl shadow-xl p-8 mb-8 w-full max-w-sm border-4 border-orange-100">' +
                '<div class="text-center">' +
                    '<p class="text-sm text-gray-500 uppercase tracking-wider mb-2">Score</p>' +
                    '<div class="text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600">' + score + '/' + total + '</div>' +
                    '<p class="text-2xl font-bold text-gray-700 mt-2">' + percentage + '%</p>' +
                '</div>' +
            '</div>' +
            '<div class="w-full space-y-3">' +
                '<button onclick="resetQuiz()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">Rejouer</button>' +
                '<button onclick="navigate('home')" class="w-full bg-white border-2 border-gray-200 text-gray-700 py-4 rounded-2xl font-bold text-lg">Retour a l'accueil</button>' +
            '</div>' +
        '</div>';
    }

    // ============================================================
    // RENDER ENGINE
    // ============================================================
    function render() {
        var app = document.getElementById('app');
        switch(state.currentPage) {
            case 'home': app.innerHTML = HomePage(); break;
            case 'admin': app.innerHTML = AdminPanel(); break;
            case 'detail': app.innerHTML = DetailPage(); break;
            case 'reader': app.innerHTML = ReaderPage(); break;
            case 'audio': app.innerHTML = AudioPage(); break;
            case 'quiz': app.innerHTML = QuizPage(); break;
            default: app.innerHTML = HomePage();
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        if (savedState.currentPage && savedState.currentPage !== 'admin') {
            state.currentPage = savedState.currentPage;
        }
        render();
    });
    </script>
</body>
</html>
